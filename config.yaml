name: Git Repo Webhoster
version: "0.1.0"
slug: gitrepo_webhoster
description: Clone a Git repository and run a user-provided start command.
url: "https://github.com/rustypig91/hassio-webhoster"
startup: services
boot: auto
panel_icon: mdi:source-repository
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  repo_url: ""
  branch: "main"
  app_subdir: ""
  start_command: ""
  pull_on_start: true
schema:
  repo_url: str
  branch: str
  app_subdir: str
  start_command: str
  pull_on_start: bool
